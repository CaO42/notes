# =============================================================================
# MkDocs Material 自动构建并部署到 GitHub Pages
# -----------------------------------------------------------------------------
# 触发条件：push 到 main 分支，且 docs/ 或 mkdocs.yml / requirements.txt 发生变更
# 部署方式：GitHub Actions（在仓库 Settings → Pages → Source 选择 "GitHub Actions"）
# =============================================================================
name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  # 允许手动触发
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一次部署，避免并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史，便于 awesome-pages 等插件

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict --clean

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
